name: Deploy Institution

on:
  push:
    branches: ["institution"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npx firebase deploy --only hosting:elimulink-institution --token "${{ secrets.FIREBASE_TOKEN }}"
