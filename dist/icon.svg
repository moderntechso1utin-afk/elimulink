<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <rect width="512" height="512" fill="#2563eb" rx="80"/>
  
  <!-- Book shape -->
  <g transform="translate(256, 256)">
    <!-- Left page -->
    <path d="M -60 -80 L -20 -80 L -20 80 L -60 80 Z" fill="#93c5fd" opacity="0.9"/>
    
    <!-- Right page -->
    <path d="M 20 -80 L 60 -80 L 60 80 L 20 80 Z" fill="#ffffff"/>
    
    <!-- Spine -->
    <rect x="-20" y="-80" width="40" height="160" fill="#1e40af"/>
    
    <!-- Left page lines (text) -->
    <line x1="-50" y1="-50" x2="-30" y2="-50" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="-50" y1="-30" x2="-30" y2="-30" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="-50" y1="-10" x2="-30" y2="-10" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="-50" y1="10" x2="-30" y2="10" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="-50" y1="30" x2="-30" y2="30" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="-50" y1="50" x2="-30" y2="50" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    
    <!-- Right page lines (text) -->
    <line x1="30" y1="-50" x2="50" y2="-50" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="30" y1="-30" x2="50" y2="-30" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="30" y1="-10" x2="50" y2="-10" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="30" y1="10" x2="50" y2="10" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="30" y1="30" x2="50" y2="30" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    <line x1="30" y1="50" x2="50" y2="50" stroke="#1e40af" stroke-width="4" opacity="0.7"/>
    
    <!-- Star accent (learning/knowledge) -->
    <polygon points="0,-120 5,-105 20,-105 10,-95 15,-80 0,-90 -15,-80 -10,-95 -20,-105 -5,-105" fill="#fbbf24"/>
  </g>
</svg>
